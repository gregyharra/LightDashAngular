@if (chartKind() === 'table' && queryResults()) {
  <div class="chart-viz__table-wrap">
    <table mat-table [dataSource]="tableRows" class="chart-viz__table">
      @for (column of displayedColumns; track column) {
        <ng-container [matColumnDef]="column">
          <th mat-header-cell *matHeaderCellDef>{{ getColumnLabel(column) }}</th>
          <td mat-cell *matCellDef="let row">{{ row[column] }}</td>
        </ng-container>
      }

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
} @else {
  <div class="chart-viz__canvas-wrap">
    <canvas #chartCanvas aria-label="Chart visualization"></canvas>
  </div>
}
