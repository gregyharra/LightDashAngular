<div
  class="add-attribute-modal"
  role="presentation"
  (click)="onBackdropClick($event)"
  (keydown)="onKeydown($event)"
>
  <div
    class="add-attribute-modal__panel"
    role="dialog"
    aria-modal="true"
    aria-labelledby="add-attribute-title"
    tabindex="-1"
  >
    <h2 id="add-attribute-title" class="add-attribute-modal__title">Add attribute</h2>

    <div class="add-attribute-modal__content">
      <mat-form-field appearance="outline" class="add-attribute-modal__field">
        <mat-label>Name</mat-label>
        <input matInput [(ngModel)]="name" autofocus />
      </mat-form-field>

      <mat-form-field appearance="outline" class="add-attribute-modal__field">
        <mat-label>Type</mat-label>
        <mat-select [ngModel]="type" (ngModelChange)="onTypeChange($event)">
          @for (option of typeOptions; track option.value) {
            <mat-option [value]="option.value">{{ option.label }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      @if (showOptionsField) {
        <mat-form-field appearance="outline" class="add-attribute-modal__field">
          <mat-label>Options (comma separated)</mat-label>
          <input matInput [(ngModel)]="optionsInput" placeholder="e.g. Low, Medium, High" />
        </mat-form-field>
        @if (parsedOptions.length) {
          <p class="add-attribute-modal__preview">{{ parsedOptions.join(', ') }}</p>
        }
      }

      @if (error()) {
        <div class="add-attribute-modal__error">{{ error() }}</div>
      }
    </div>

    <div class="add-attribute-modal__actions">
      <button mat-stroked-button type="button" (click)="cancel()">Cancel</button>
      <button mat-flat-button type="button" (click)="save()">Add attribute</button>
    </div>
  </div>
</div>
