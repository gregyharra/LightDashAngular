<div class="content-list-column-header">
  <span class="content-list-column-header__label">{{ label() }}</span>
  <button
    type="button"
    class="content-list-column-header__filter-btn"
    [class.content-list-column-header__filter-btn--active]="isActive()"
    [matMenuTriggerFor]="filterMenu"
    [attr.aria-label]="'Filter ' + label()"
    [attr.aria-pressed]="isActive()"
    (click)="$event.stopPropagation()"
    (menuOpened)="syncDraftFromValue()"
  >
    <mat-icon>filter_list</mat-icon>
  </button>

  <mat-menu #filterMenu="matMenu" class="content-list-column-header__menu">
    <ng-template matMenuContent>
      <div class="content-list-column-header__menu-panel" (click)="$event.stopPropagation()">
      <p class="content-list-column-header__menu-title">Filter by {{ label() }}</p>

      @switch (filterType()) {
        @case ('text') {
          <label class="content-list-column-header__field">
            <span class="content-list-column-header__field-label">Contains</span>
            <input
              class="content-list-column-header__input"
              type="search"
              [placeholder]="textPlaceholder()"
              [ngModel]="draftText()"
              (ngModelChange)="draftText.set($event)"
              (keydown.enter)="applyFilter()"
            />
          </label>
        }
        @case ('select') {
          <div class="content-list-column-header__options">
            @for (option of options(); track option.value) {
              <label class="content-list-column-header__option">
                <mat-checkbox
                  [checked]="isOptionSelected(option.value)"
                  (change)="toggleSelectOption(option.value, $event.checked)"
                />
                <span>{{ option.label }}</span>
              </label>
            }
          </div>
        }
        @case ('date') {
          <label class="content-list-column-header__field">
            <span class="content-list-column-header__field-label">From</span>
            <input
              class="content-list-column-header__input"
              type="date"
              [ngModel]="draftDateFrom()"
              (ngModelChange)="draftDateFrom.set($event || null)"
            />
          </label>
          <label class="content-list-column-header__field">
            <span class="content-list-column-header__field-label">To</span>
            <input
              class="content-list-column-header__input"
              type="date"
              [ngModel]="draftDateTo()"
              (ngModelChange)="draftDateTo.set($event || null)"
            />
          </label>
        }
        @case ('number') {
          <label class="content-list-column-header__field">
            <span class="content-list-column-header__field-label">Operator</span>
            <select
              class="content-list-column-header__input content-list-column-header__select"
              [ngModel]="draftNumberOperator()"
              (ngModelChange)="onNumberOperatorChange($event)"
            >
              @for (option of numberOperatorOptions; track option.value) {
                <option [ngValue]="option.value">{{ option.label }}</option>
              }
            </select>
          </label>
          @if (numberNeedsTwoValues()) {
            <div class="content-list-column-header__number-range">
              <label class="content-list-column-header__field">
                <span class="content-list-column-header__field-label">Min</span>
                <input
                  class="content-list-column-header__input"
                  type="number"
                  placeholder="Any"
                  [ngModel]="draftNumberValue()"
                  (ngModelChange)="setDraftNumberValue($event)"
                  (keydown.enter)="applyFilter()"
                />
              </label>
              <label class="content-list-column-header__field">
                <span class="content-list-column-header__field-label">Max</span>
                <input
                  class="content-list-column-header__input"
                  type="number"
                  placeholder="Any"
                  [ngModel]="draftNumberValueTo()"
                  (ngModelChange)="setDraftNumberValueTo($event)"
                  (keydown.enter)="applyFilter()"
                />
              </label>
            </div>
          } @else {
            <label class="content-list-column-header__field">
              <span class="content-list-column-header__field-label">Value</span>
              <input
                class="content-list-column-header__input"
                type="number"
                placeholder="Enter a number"
                [ngModel]="draftNumberValue()"
                (ngModelChange)="setDraftNumberValue($event)"
                (keydown.enter)="applyFilter()"
              />
            </label>
          }
        }
      }

      <div class="content-list-column-header__menu-actions">
        <button
          type="button"
          class="content-list-column-header__clear-btn"
          (click)="clearFilter()"
        >
          Clear
        </button>
        <button
          type="button"
          class="content-list-column-header__apply-btn"
          (click)="applyFilter()"
        >
          Apply
        </button>
      </div>
      </div>
    </ng-template>
  </mat-menu>
</div>
