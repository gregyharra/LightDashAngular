<div class="shell" id="navbar-header" data-ld-navbar>
  <header class="shell__navbar">
    <div class="shell__navbar-left">
      <a routerLink="/projects" class="shell__logo" title="Home">
        <img src="assets/logo-icon.svg" alt="LightDash" width="32" height="32" />
      </a>

      @if (activeProjectService.activeProjectUuid()) {
        <div class="shell__nav-group shell__nav-group--primary">
          <button
            mat-button
            class="shell__nav-btn"
            [matMenuTriggerFor]="newMenu"
            aria-label="New"
          >
            <mat-icon>add_box</mat-icon>
            <span class="shell__nav-label">New</span>
          </button>
          <mat-menu #newMenu="matMenu" panelClass="ld-navbar-menu">
            <a
              mat-menu-item
              [routerLink]="['/projects', activeProjectService.activeProjectUuid(), 'dashboards', 'create']"
            >
              <mat-icon>dashboard</mat-icon>
              Dashboard
            </a>
          </mat-menu>
          <a
            mat-button
            class="shell__nav-btn"
            [routerLink]="['/projects', activeProjectService.activeProjectUuid(), 'dashboards']"
            aria-label="Browse"
          >
            <mat-icon>folder</mat-icon>
            <span class="shell__nav-label">Browse</span>
          </a>
          <a
            mat-button
            class="shell__nav-btn"
            [routerLink]="['/projects', activeProjectService.activeProjectUuid(), 'tables']"
            aria-label="Metrics"
          >
            <mat-icon>table_chart</mat-icon>
            <span class="shell__nav-label">Metrics</span>
          </a>
          <button
            mat-button
            class="shell__nav-btn shell__nav-btn--ai shell__nav-btn--hide-md"
            disabled
            aria-label="Ask AI"
          >
            <mat-icon>auto_awesome</mat-icon>
            <span class="shell__nav-label">Ask AI</span>
          </button>
        </div>
      }
    </div>

    @if (activeProjectService.activeProject(); as project) {
      <div class="shell__search">
        <mat-icon class="shell__search-icon">search</mat-icon>
        <input
          type="search"
          class="shell__search-input"
          [placeholder]="'Search ' + project.name"
          aria-label="Search project"
          disabled
        />
        <span class="shell__search-shortcut">⌘+K</span>
      </div>
    } @else {
      <div class="shell__navbar-spacer"></div>
    }

    <div class="shell__navbar-right">
      <div class="shell__nav-group shell__nav-group--secondary">
        <button mat-button class="shell__nav-btn shell__nav-btn--icon" disabled aria-label="Settings">
          <mat-icon>settings</mat-icon>
        </button>
        <button mat-button class="shell__nav-btn shell__nav-btn--icon shell__nav-btn--notifications" disabled aria-label="Notifications">
          <mat-icon>notifications_none</mat-icon>
          <span class="shell__notification-dot"></span>
        </button>
        <button
          mat-button
          class="shell__nav-btn shell__nav-btn--icon shell__nav-btn--hide-sm"
          disabled
          aria-label="Help"
        >
          <mat-icon>help_outline</mat-icon>
        </button>
        @if (activeProjectService.activeProjectUuid()) {
          <app-navbar-project-switcher />
        }
      </div>
      <app-navbar-user-menu />
    </div>
  </header>

  <div class="shell__navbar-placeholder"></div>

  <main class="shell__content">
    <router-outlet />
  </main>
</div>
