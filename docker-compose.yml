services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mds
      POSTGRES_PASSWORD: mds
      POSTGRES_DB: mds
    ports:
      - "5432:5432"
    volumes:
      - mds_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mds -d mds"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgweb:
    image: sosedoff/pgweb:latest
    environment:
      PGWEB_DATABASE_URL: postgres://mds:mds@postgres:5432/mds?sslmode=disable
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mds
      MINIO_ROOT_PASSWORD: mdsmdsmds
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - mds_minio_data:/data
    profiles:
      - artifacts

volumes:
  mds_postgres_data:
  mds_minio_data:
